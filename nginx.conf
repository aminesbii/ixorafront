server {
    listen 80;
    server_name ixora.tn;
    root /usr/share/nginx/html;
    index index.html;

    # Allow larger uploads (increase as needed). Fixes 413 Request Entity Too Large.
    # Set this to a value slightly larger than the largest expected upload.
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Gestion des routes Angular
    location / {
        try_files $uri $uri/ /index.html;
    }

   

    # Cache pour les assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Headers spécifiques pour les modules JavaScript
    location ~* \.js$ {
        add_header Content-Type application/javascript;
    }

    # Gestion des erreurs
    error_page 404 /index.html;
}

