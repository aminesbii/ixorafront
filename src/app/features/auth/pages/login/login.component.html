<section class="min-h-screen w-full flex">
  <!-- Left side - Branding -->
  <div class="hidden lg:flex lg:w-1/2 xl:w-5/12 bg-[var(--color-ixora-black)] items-center justify-center relative overflow-hidden">
    <div class="absolute top-0 left-0 w-64 h-64 bg-[var(--color-ixora-green)]/5 rounded-br-full"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-[var(--color-ixora-blue)]/[0.03] rounded-tl-full"></div>

    <div class="relative z-10 text-center px-8">
      <img src="/icons/IXORLogo.png" alt="IXORA Logo" class="h-24 mx-auto mb-8 object-contain invert" noParallax />
      <h2 class="text-3xl font-serif text-white mb-4">Welcome Back</h2>
      <p class="text-gray-400 font-sans text-sm leading-relaxed max-w-xs mx-auto">
        Your journey to radiant skin continues here. Sign in to access your account and exclusive offers.
      </p>
      <div class="mt-12 w-16 h-0.5 bg-[var(--color-ixora-green)] mx-auto"></div>
    </div>
  </div>

  <!-- Right side - Login Form -->
  <div class="w-full lg:w-1/2 xl:w-7/12 flex items-center justify-center bg-white px-6 sm:px-12 py-12">
    <div class="w-full max-w-md">
      <!-- Mobile logo -->
      <div class="lg:hidden text-center mb-8">
        <img src="/icons/IXORLogo.png" alt="IXORA Logo" class="h-16 mx-auto object-contain" noParallax />
      </div>

      <div class="text-center mb-8">
        <h1 class="text-2xl font-serif text-[var(--color-ixora-black)]">Sign In</h1>
        <p class="text-gray-500 text-sm mt-2 font-sans">Enter your details to access your account</p>
      </div>

      <form (ngSubmit)="onLogin()" class="space-y-6">
        <!-- Error Banner -->
        <div
          *ngIf="errorMessage"
          class="flex items-center gap-3 p-3.5 rounded-none bg-rose-50 border-l-4 border-rose-500 text-rose-700 text-sm"
        >
          <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span>{{ errorMessage }}</span>
        </div>

        <div>
          <label for="email" class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">
            Email Address
          </label>
          <input
            id="email"
            name="email"
            type="email"
            [(ngModel)]="email"
            required
            [disabled]="isLoading"
            class="w-full px-4 py-3 bg-white border border-gray-200 text-[var(--color-ixora-black)] placeholder-gray-400 focus:outline-none focus:border-[var(--color-ixora-green)] focus:ring-1 focus:ring-[var(--color-ixora-green)]/20 text-sm transition-all disabled:opacity-50"
            placeholder="you@example.com"
          />
        </div>

        <div>
          <label for="password" class="block text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">
            Password
          </label>
          <input
            id="password"
            name="password"
            type="password"
            [(ngModel)]="password"
            required
            [disabled]="isLoading"
            class="w-full px-4 py-3 bg-white border border-gray-200 text-[var(--color-ixora-black)] placeholder-gray-400 focus:outline-none focus:border-[var(--color-ixora-green)] focus:ring-1 focus:ring-[var(--color-ixora-green)]/20 text-sm transition-all disabled:opacity-50"
            placeholder="••••••••"
          />
        </div>

        <div class="flex items-center justify-between text-xs">
          <div class="flex items-center">
            <input
              id="remember-me"
              name="remember-me"
              type="checkbox"
              class="h-4 w-4 rounded-none border-gray-300 bg-white text-[var(--color-ixora-green)] focus:ring-[var(--color-ixora-green)]/20 accent-[var(--color-ixora-green)]"
            />
            <label for="remember-me" class="ml-2 text-gray-500">
              Remember me
            </label>
          </div>

          <div>
            <a href="#" class="font-semibold text-[var(--color-ixora-green)] hover:text-[var(--color-ixora-black)] transition-colors">
              Forgot password?
            </a>
          </div>
        </div>

        <div>
          <button
            type="submit"
            [disabled]="isLoading"
            class="w-full flex justify-center items-center gap-2 py-3.5 px-4 border border-transparent text-sm font-semibold text-white bg-[var(--color-ixora-black)] hover:bg-[var(--color-ixora-green)] disabled:bg-gray-400 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[var(--color-ixora-green)] transition-all duration-300 cursor-pointer uppercase tracking-widest"
          >
            <svg
              *ngIf="isLoading"
              class="animate-spin h-4 w-4 text-white"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <span>{{ isLoading ? 'Signing in...' : 'Sign In' }}</span>
          </button>
        </div>
      </form>

      <div class="mt-8 pt-6 border-t border-gray-100 text-center">
        <p class="text-xs text-gray-500">
          Don't have an account?
          <a routerLink="/auth/register" class="font-semibold text-[var(--color-ixora-green)] hover:text-[var(--color-ixora-black)] transition-colors">
            Sign up
          </a>
        </p>
      </div>
    </div>
  </div>
</section>
