<form (ngSubmit)="onLogin()" class="space-y-6">

  <!-- Error Banner -->
  <div
    *ngIf="errorMessage"
    class="flex items-center gap-3 p-3.5 rounded-xl bg-rose-950/50 border border-rose-800/50 text-rose-300 text-sm"
  >
    <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <span>{{ errorMessage }}</span>
  </div>

  <div>
    <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-400">
      Email address
    </label>
    <div class="mt-2">
      <input
        id="email"
        name="email"
        type="email"
        [(ngModel)]="email"
        required
        [disabled]="isLoading"
        class="w-full px-4 py-2.5 bg-slate-950 border border-slate-800/80 rounded-xl text-slate-200 placeholder-slate-600 focus:outline-none focus:border-violet-500/50 focus:ring-1 focus:ring-violet-500/30 text-sm transition-all disabled:opacity-50"
        placeholder="you&#64;example.com"
      />
    </div>
  </div>

  <div>
    <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-400">
      Password
    </label>
    <div class="mt-2">
      <input
        id="password"
        name="password"
        type="password"
        [(ngModel)]="password"
        required
        [disabled]="isLoading"
        class="w-full px-4 py-2.5 bg-slate-950 border border-slate-800/80 rounded-xl text-slate-200 placeholder-slate-600 focus:outline-none focus:border-violet-500/50 focus:ring-1 focus:ring-violet-500/30 text-sm transition-all disabled:opacity-50"
        placeholder="••••••••"
      />
    </div>
  </div>

  <div class="flex items-center justify-between text-xs">
    <div class="flex items-center">
      <input
        id="remember-me"
        name="remember-me"
        type="checkbox"
        class="h-4 w-4 rounded border-slate-800 bg-slate-950 text-violet-600 focus:ring-violet-500/30 accent-violet-600"
      />
      <label for="remember-me" class="ml-2 text-slate-400">
        Remember me
      </label>
    </div>

    <div class="text-slate-400">
      <a href="#" class="font-semibold text-violet-400 hover:text-violet-300">
        Forgot your password?
      </a>
    </div>
  </div>

  <div>
    <button
      type="submit"
      [disabled]="isLoading"
      class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-xl shadow-lg shadow-violet-500/20 text-sm font-semibold text-white bg-violet-600 hover:bg-violet-500 disabled:bg-violet-800/60 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-violet-500 transition-all cursor-pointer"
    >
      <svg
        *ngIf="isLoading"
        class="animate-spin h-4 w-4 text-white"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
      <span>{{ isLoading ? 'Signing in...' : 'Sign In' }}</span>
    </button>
  </div>
</form>
