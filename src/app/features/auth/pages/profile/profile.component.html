<app-navbar></app-navbar>

<main class="min-h-screen bg-[var(--color-ixora-white)] pt-[64px]">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 py-8 md:py-12">
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-[var(--color-ixora-black)]">Profile</h1>
      <p class="text-sm text-[var(--color-ixora-black)]/50 mt-1">Manage your personal information</p>
    </div>

    <div *ngIf="isLoading" class="flex items-center justify-center py-20">
      <div class="w-8 h-8 border-2 border-[var(--color-ixora-green)] border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div *ngIf="!isLoading && user" class="bg-white border border-[var(--color-ixora-black)]/10">
      <div class="p-8 border-b border-[var(--color-ixora-black)]/10">
        <div class="flex items-center gap-6">
          <div class="w-16 h-16 rounded-full bg-[var(--color-ixora-black)] text-white flex items-center justify-center text-2xl font-bold flex-shrink-0">
            {{ getInitials() }}
          </div>
          <div>
            <h2 class="text-lg font-bold text-[var(--color-ixora-black)]">{{ user.full_name }}</h2>
            <div class="flex items-center gap-3 mt-1">
              <span class="text-xs text-[var(--color-ixora-black)]/50">{{ user.email }}</span>
              <span class="px-2.5 py-0.5 text-[10px] font-semibold uppercase tracking-wider text-white rounded-sm"
                [class.bg-[var(--color-ixora-blue)]]="user.role === 'ADMIN'"
                [class.bg-gray-500]="user.role !== 'ADMIN'">
                {{ user.role }}
              </span>
            </div>
          </div>
          <div class="ml-auto">
            <button *ngIf="!isEditing" (click)="toggleEdit()"
              class="px-5 py-2 text-[10px] uppercase tracking-widest font-semibold bg-[var(--color-ixora-black)] text-white hover:bg-[var(--color-ixora-green)] transition-colors duration-300 cursor-pointer">
              Edit Profile
            </button>
            <button *ngIf="isEditing" (click)="toggleEdit()"
              class="px-5 py-2 text-[10px] uppercase tracking-widest font-semibold border border-gray-300 text-gray-600 hover:bg-gray-50 transition-colors duration-300 cursor-pointer">
              Cancel
            </button>
          </div>
        </div>
      </div>

      <div class="p-8">
        <form [formGroup]="profileForm" (ngSubmit)="save()">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-[10px] uppercase tracking-widest font-semibold text-gray-500 mb-2">Full Name</label>
              <ng-container *ngIf="!isEditing">
                <p class="text-sm font-medium text-[var(--color-ixora-black)]">{{ user.full_name }}</p>
              </ng-container>
              <input *ngIf="isEditing" formControlName="full_name" type="text"
                class="w-full px-4 py-2 border border-gray-200 rounded-sm text-sm focus:outline-none focus:ring-1 focus:ring-gray-300 transition-colors"
                placeholder="Enter your name" />
            </div>

            <div>
              <label class="block text-[10px] uppercase tracking-widest font-semibold text-gray-500 mb-2">Email</label>
              <p class="text-sm font-medium text-[var(--color-ixora-black)]">{{ user.email }}</p>
              <p class="text-[10px] text-gray-400 mt-0.5">Email cannot be changed</p>
            </div>

            <div>
              <label class="block text-[10px] uppercase tracking-widest font-semibold text-gray-500 mb-2">Phone</label>
              <ng-container *ngIf="!isEditing">
                <p class="text-sm font-medium text-[var(--color-ixora-black)]">{{ user.phone || 'Not set' }}</p>
              </ng-container>
              <input *ngIf="isEditing" formControlName="phone" type="tel"
                class="w-full px-4 py-2 border border-gray-200 rounded-sm text-sm focus:outline-none focus:ring-1 focus:ring-gray-300 transition-colors"
                placeholder="Enter your phone number" />
            </div>

            <div>
              <label class="block text-[10px] uppercase tracking-widest font-semibold text-gray-500 mb-2">Member Since</label>
              <p class="text-sm font-medium text-[var(--color-ixora-black)]">{{ getMemberSince() }}</p>
            </div>

            <div>
              <label class="block text-[10px] uppercase tracking-widest font-semibold text-gray-500 mb-2">Status</label>
              <span class="inline-flex items-center gap-1.5 text-sm font-medium"
                [class.text-[var(--color-ixora-green)]]="user.status === 'ACTIVE'"
                [class.text-yellow-600]="user.status !== 'ACTIVE'">
                <span class="w-2 h-2 rounded-full"
                  [class.bg-[var(--color-ixora-green)]]="user.status === 'ACTIVE'"
                  [class.bg-yellow-500]="user.status !== 'ACTIVE'"></span>
                {{ user.status }}
              </span>
            </div>

            <div>
              <label class="block text-[10px] uppercase tracking-widest font-semibold text-gray-500 mb-2">Role</label>
              <span class="text-sm font-medium text-[var(--color-ixora-black)]">{{ user.role }}</span>
            </div>
          </div>

          <div *ngIf="isEditing" class="mt-8 pt-6 border-t border-[var(--color-ixora-black)]/10 flex justify-end">
            <button type="submit" [disabled]="profileForm.invalid || isSaving"
              class="px-8 py-2.5 text-[10px] uppercase tracking-widest font-semibold bg-[var(--color-ixora-black)] text-white hover:bg-[var(--color-ixora-green)] disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-300 flex items-center gap-2 cursor-pointer">
              <div *ngIf="isSaving" class="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
              {{ isSaving ? 'Saving...' : 'Save Changes' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>
