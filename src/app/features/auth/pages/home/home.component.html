<app-navbar></app-navbar>

<main class="w-full overflow-hidden bg-[var(--color-ixora-white)] text-[var(--color-ixora-black)]">
  <app-hero></app-hero>

  <app-featured-products></app-featured-products>

  <app-sales-products></app-sales-products>

  <app-shop-by-category></app-shop-by-category>

  <!-- Brand Statement -->
  <section class="py-24 bg-[var(--color-ixora-black)] text-white text-center px-4" id="brand">
    <div #revealEl class="max-w-4xl mx-auto space-y-6">
      <p class="uppercase tracking-[0.3em] text-[var(--color-ixora-green)] text-xs font-semibold line-reveal-wrapper">
        <span class="line-reveal-inner">Our Philosophy</span>
      </p>
      <h2 class="text-3xl lg:text-5xl font-serif leading-relaxed">
        <span class="line-reveal-wrapper"><span class="line-reveal-inner">"The dermocosmetic brand</span></span><br />
        <span class="line-reveal-wrapper"><span class="line-reveal-inner">that understands your skin's unique
            needs."</span></span>
      </h2>
    </div>
  </section>

  <app-promo-split
    tag="New Collection"
    title="The Pure<br />Collection"
    description="Restore balance and clarity to your complexion with our green-tea infused Pure Collection. Formulated to calm redness and minimize pores instantly."
    buttonText="Discover More"
    imageUrl="https://images.unsplash.com/photo-1596462502278-27bfdc403348?q=80&w=800&auto=format&fit=crop"
    imageAlt="Pure Collection"
    accentColor="green"
    imageSide="right">
  </app-promo-split>

  <app-promo-split
    tag="Bestseller"
    title="Deep Blue<br />Hydration"
    description="Dive into 48-hour moisture with our hyaluronic acid and marine botanical blend. Plumps fine lines and protects the skin barrier."
    buttonText="Shop Serum"
    imageUrl="https://images.unsplash.com/photo-1611930022073-b7a4ba5fcccd?q=80&w=800&auto=format&fit=crop"
    imageAlt="Deep Blue Hydration"
    accentColor="blue"
    imageSide="left">
  </app-promo-split>

  <!-- Testimonials Carousel -->
  <section class="py-24 bg-gray-50 border-t border-gray-100">
    <div class="container mx-auto px-4 text-center">
      <h2 #revealEl class="text-4xl font-serif mb-16 gsap-reveal">What They Say</h2>

      <div #revealEl class="carousel w-full max-w-4xl mx-auto gsap-reveal">
        <div *ngFor="let test of testimonials; let i = index; let first = first; let last = last" [id]="'slide' + i"
          class="carousel-item relative w-full flex-col items-center justify-center px-12">
          <svg class="w-12 h-12 text-[var(--color-ixora-green)] mb-8 opacity-50" fill="currentColor"
            viewBox="0 0 32 32">
            <path
              d="M10 8c-3.3 0-6 2.7-6 6v10h10V14H8.3c.5-1.9 2.2-3.3 4.2-3.5V8zm16 0c-3.3 0-6 2.7-6 6v10h10V14h-5.7c.5-1.9 2.2-3.3 4.2-3.5V8z" />
          </svg>
          <p class="text-2xl lg:text-3xl font-serif leading-relaxed italic mb-8">"{{ test.quote }}"</p>
          <p class="uppercase tracking-widest text-sm font-semibold">— {{ test.author }}</p>

          <div class="absolute flex justify-between transform -translate-y-1/2 left-0 right-0 top-1/2">
            <a [href]="'#slide' + (i === 0 ? testimonials.length - 1 : i - 1)" class="btn btn-circle btn-ghost">❮</a>
            <a [href]="'#slide' + (i === testimonials.length - 1 ? 0 : i + 1)" class="btn btn-circle btn-ghost">❯</a>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<app-footer></app-footer>
