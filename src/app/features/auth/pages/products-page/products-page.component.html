<app-navbar></app-navbar>

<section class="min-h-screen bg-white   pt-[64px]">
  <!-- Header -->
  <div class="bg-gray-50 border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 md:px-8 py-6 md:py-8">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 class="text-3xl md:text-4xl font-serif">{{ onSaleFilter ? 'Sales' : 'Products' }}</h1>
          <div class="w-10 h-0.5 mt-3" [class.bg-red-500]="onSaleFilter" [class.bg-[var(--color-ixora-green)]]="!onSaleFilter"></div>
          <p *ngIf="onSaleFilter" class="text-xs text-red-500 font-semibold mt-2 uppercase tracking-wider">Discounted items</p>
        </div>
        <div class="w-full md:w-80 lg:w-96">
          <app-search-bar (search)="onSearch($event)"></app-search-bar>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile filter button (fixed, always visible on small screens) -->
  <div class="lg:hidden fixed bottom-6 right-6 z-30">
    <button (click)="toggleMobileFilter()"
            class="flex items-center gap-2 px-5 py-3 bg-[var(--color-ixora-black)] text-white text-[10px] uppercase tracking-[0.2em] font-bold shadow-lg hover:bg-opacity-90 transition-all duration-300">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
      </svg>
      <span>Filter</span>
    </button>
  </div>

  <div class="max-w-7xl mx-auto px-4 md:px-8 py-8">
    <div class="flex flex-col lg:flex-row gap-0 lg:gap-10">
      <!-- Sidebar (hidden on mobile — opened as overlay via drawer classes) -->
      <aside class="hidden lg:block lg:w-[260px] xl:w-[280px] flex-shrink-0 lg:sticky lg:top-[90px] lg:self-start lg:max-h-[calc(100vh-110px)] lg:overflow-y-auto">
        <div class="hidden lg:block text-xs text-gray-400 mb-6">{{ totalProducts }} product{{ totalProducts !== 1 ? 's' : '' }}</div>
        <app-sidebar-filter
          [mobileOpen]="mobileFilterOpen"
          [initialCategoryId]="currentFilters.category_id"
          (filterChange)="onFilterChange($event)"
          (mobileClose)="toggleMobileFilter()">
        </app-sidebar-filter>
      </aside>

      <!-- Product Grid -->
      <main class="flex-1 min-w-0">

        <!-- Loading -->
        <div *ngIf="loading" class="flex flex-col items-center justify-center py-20">
          <div class="w-10 h-10 border-2 border-[var(--color-ixora-black)] border-t-transparent rounded-full animate-spin mb-4"></div>
          <p class="text-xs uppercase tracking-[0.3em] text-gray-400">Loading products...</p>
        </div>

        <!-- Error -->
        <div *ngIf="error && !loading" class="text-center py-20">
          <p class="text-sm text-gray-500 mb-4">{{ error }}</p>
          <button (click)="loadProducts()"
                  class="px-6 py-2 text-[10px] uppercase tracking-widest font-semibold bg-[var(--color-ixora-black)] text-white hover:bg-[var(--color-ixora-green)] transition-colors duration-300">
            Try Again
          </button>
        </div>

        <!-- Products -->
        <div *ngIf="!loading && !error && products.length === 0" class="text-center py-20">
          <p class="text-sm text-gray-400 uppercase tracking-[0.2em]">No products found</p>
        </div>

        <div *ngIf="!loading && products.length > 0">
          <div class="products-grid gap-5">
            <app-product-card
              *ngFor="let product of products"
              [product]="product"
              (addToCart)="onAddToCart($event)"
              (viewProduct)="onViewProduct($event)">
            </app-product-card>
          </div>

          <!-- Pagination -->
          <div *ngIf="totalPages > 1" class="flex items-center justify-between mt-12 pt-8 border-t border-gray-100">
            <span class="text-xs text-gray-400">
              Showing {{ showingFrom }}–{{ showingTo }} of {{ totalProducts }}
            </span>
            <div class="flex items-center gap-2">
              <button
                (click)="onPageChange(currentPage - 1)"
                [disabled]="currentPage === 1"
                class="px-3 py-1.5 text-xs border border-gray-200 hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed transition-colors rounded-none">
                Prev
              </button>
              <button
                *ngFor="let p of pageNumbers"
                (click)="onPageChange(p)"
                class="px-3 py-1.5 text-xs border transition-colors rounded-none"
                [class.bg-[var(--color-ixora-black)]!]="p === currentPage"
                [class.text-white]="p === currentPage"
                [class.border-gray-200]="p !== currentPage"
                [class.hover:bg-gray-50]="p !== currentPage">
                {{ p }}
              </button>
              <button
                (click)="onPageChange(currentPage + 1)"
                [disabled]="currentPage === totalPages"
                class="px-3 py-1.5 text-xs border border-gray-200 hover:bg-gray-50 disabled:opacity-30 disabled:cursor-not-allowed transition-colors rounded-none">
                Next
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
</section>

<!-- Cart Feedback -->
<div *ngIf="cartFeedback"
     class="fixed bottom-8 right-8 z-50 bg-[var(--color-ixora-black)] text-white px-6 py-4 shadow-xl border border-gray-800 transition-all duration-300">
  <span class="text-sm font-sans tracking-wide uppercase">{{ cartFeedback }}</span>
</div>

<app-footer></app-footer>
