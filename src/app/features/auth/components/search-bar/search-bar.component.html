<div class="relative w-full">
  <div class="relative">
    <svg xmlns="http://www.w3.org/2000/svg"
         class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-400 pointer-events-none z-10"
         fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
    </svg>
    <input
      #searchInput
      type="text"
      [(ngModel)]="query"
      (ngModelChange)="onInput($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
      (keydown)="onKeydown($event)"
      placeholder="Search products..."
      autocomplete="off"
      class="search-input w-full pl-9 pr-8 py-2 border border-gray-200 rounded-md bg-transparent text-sm text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-1 focus:ring-gray-400 focus:border-gray-400 transition-colors relative z-[1]"
    />
    <button *ngIf="query"
            (click)="clear()"
            class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors z-10">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Suggestion dropdown -->
  <div *ngIf="showHint && suggestions.length > 0"
       class="suggestion-list absolute left-0 right-0 top-full mt-1 bg-white border border-gray-200 rounded-md shadow-lg z-50 max-h-72 overflow-y-auto">
    <button *ngFor="let s of suggestions; let i = index"
            (click)="selectSuggestion(s)"
            (mouseenter)="highlightIndex = i"
            class="w-full flex items-center gap-3 px-3 py-2.5 text-left transition-colors"
            [class.bg-gray-50]="highlightIndex === i"
            [class.bg-white]="highlightIndex !== i">
      <div class="w-10 h-10 rounded-md overflow-hidden bg-gray-100 flex-shrink-0 border border-gray-200">
        <img *ngIf="s.images?.[0]?.image_url" [src]="s.images[0].image_url" [alt]="s.name"
             class="w-full h-full object-cover" />
        <div *ngIf="!s.images?.[0]?.image_url" class="w-full h-full flex items-center justify-center text-gray-300">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </div>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-gray-800 truncate">{{ s.name }}</p>
        <p class="text-xs text-gray-500" *ngIf="s.base_price != null">{{ s.base_price }} TND</p>
      </div>
    </button>
  </div>
</div>
