<section id="home-hero" class="hero-section relative z-0 w-full min-h-screen overflow-hidden pt-12 pb-12 sm:pt-12 lg:pt-12">

        <h1 class=" font-semibold leading-[0.88] text-white">
          <span class="line-reveal-wrapper mb-4 text-6xl sm:text-7xl lg:text-[6.9rem] xl:text-[7.5rem]"><span class="line-reveal-inner">IXORA</span></span>

          <span class="line-reveal-wrapper text-2xl sm:text-3xl lg:text-[1.9rem] xl:text-[2.5rem]"><span class="line-reveal-inner">Une marque 100% <br/>

        </p>

        <div class="line-reveal-wrapper mt-10">
          <div class="line-reveal-inner">

              Shop Now

          </div>
        </div>

      </div>

          <div class="hero-orb hero-orb-right"></div>
          <div #revealEl data-delay="0.15" class="hero-badge">Best Seller</div>
          <figure #revealEl data-delay="0.2"  class="hero-product-card relative z-10 mx-auto">
                <div #revealEl data-delay="0.2" class="relative gsap-reveal-right">
        <div class="hover-3d">

          <figure class="max-w-100 rounded-2xl">

          <!-- 8 empty divs needed for the 3D effect -->
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
      </div>
          </figure>
          <div #revealEl data-delay="0.25" class="floating-card">
            <span>48H</span>
