<div class="product-card card rounded-none group cursor-pointer bg-white"
     (click)="onClick()">
  <figure class="relative aspect-square overflow-hidden bg-gray-50">
    <img *ngIf="hasImage" [src]="mainImage"
         [alt]="product.name"
         class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
         loading="lazy"
         (error)="onImgError()" />
    <div *ngIf="!hasImage"
         class="w-full h-full flex items-center justify-center bg-gray-100">
      <div class="text-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-gray-300 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <p class="text-[10px] uppercase tracking-[0.2em] text-gray-300">No image</p>
      </div>
    </div>
    <div
      class="absolute bottom-0 left-0 w-full p-4 translate-y-full group-hover:translate-y-0 transition-transform duration-300">
      <button
        (click)="onAddToCart($event)"
        class="btn w-full bg-white text-[var(--color-ixora-black)] hover:bg-[var(--color-ixora-green)] hover:text-white border-none rounded-none text-[11px] uppercase tracking-widest font-semibold"
        aria-label="Add {{ product.name }} to cart">
        Add to Cart
      </button>
    </div>
  </figure>
  <div class="card-body px-0 py-5">
    <h3 class="font-sans text-sm md:text-base font-medium text-gray-800 tracking-wide">{{ product.name }}</h3>
    <p class="text-[13px] text-gray-500 mt-1.5 line-clamp-2 leading-relaxed">{{ product.short_description || product.description }}</p>
    <p class="text-sm font-semibold text-[var(--color-ixora-black)] mt-3">{{ firstPrice }}</p>
  </div>
</div>
