<section class="py-24 container mx-auto px-4" id="products">
  <div #revealEl class="text-center mb-16 gsap-reveal">
    <h2 class="text-4xl font-serif">Featured Products</h2>
    <div class="w-16 h-1 bg-[var(--color-ixora-blue)] mx-auto mt-6"></div>
  </div>

  <div class="flex overflow-x-auto snap-x snap-mandatory gap-6 pb-12 pt-4 hide-scrollbar px-4"
    style="scroll-behavior: smooth;">
    <div *ngFor="let product of featuredProducts; let i = index" #revealEl [attr.data-delay]="i * 0.1"
      class="card rounded-none group cursor-pointer gsap-reveal flex-none w-[80vw] md:w-[40vw] lg:w-[22vw] snap-center">
      <figure class="relative h-80 overflow-hidden bg-gray-100">
        <img [src]="product.image" alt="{{ product.name }}"
          class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
        <div *ngIf="product.tag"
          class="absolute top-4 right-4 bg-[var(--color-ixora-black)] text-white text-xs uppercase px-3 py-1 tracking-wider">
          {{ product.tag }}
        </div>
        <div
          class="absolute bottom-0 left-0 w-full p-4 translate-y-full group-hover:translate-y-0 transition-transform duration-300">
          <button
            (click)="addToCart(product); $event.stopPropagation()"
            class="btn w-full bg-white text-[var(--color-ixora-black)] hover:bg-[var(--color-ixora-green)] hover:text-white border-none rounded-none">Add to Cart</button>
        </div>
      </figure>
      <div class="card-body px-0 py-6 items-center text-center">
        <h3 class="card-title font-sans text-lg font-medium tracking-wide">{{ product.name }}</h3>
        <p class="text-gray-500">{{ product.price }}</p>
      </div>
    </div>
  </div>

  <div *ngIf="cartFeedbackMessage"
       class="fixed bottom-8 right-8 z-50 bg-[var(--color-ixora-black)] text-white px-6 py-4 shadow-xl border border-gray-800 transition-all duration-300 flex items-center gap-3">
    <span class="text-sm font-sans tracking-wide uppercase">{{ cartFeedbackMessage }}</span>
    <button (click)="cartFeedbackMessage = ''" class="text-gray-400 hover:text-white ml-2">&times;</button>
  </div>
</section>
