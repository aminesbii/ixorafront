<section class="featured-products-section px-4 overflow-hidden relative" id="products">
  <section class="featured-products-inner py-24 max-w-7xl mx-auto px-4 relative">
    <button *ngIf="canScrollLeft" class="scroll-arrow scroll-arrow--left" (click)="scrollLeft()" aria-label="Scroll left">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>

    <button *ngIf="canScrollRight" class="scroll-arrow scroll-arrow--right" (click)="scrollRight()" aria-label="Scroll right">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>

    <div #revealEl class="text-center mb-16 gsap-reveal">
      <h2 class="text-4xl font-serif">Featured Products</h2>
      <div class="w-16 h-1 bg-[var(--color-ixora-green)] mx-auto mt-6"></div>
    </div>

    <div class="products-viewport" #scrollWrapper [class.has-scroll]="featuredProducts.length > 4" (scroll)="onScroll()">
      <div class="products-track" [class.is-scrollable]="featuredProducts.length > 4">
        <div *ngFor="let product of featuredProducts; let i = index" #revealEl [attr.data-delay]="i * 0.08"
          class="product-card card rounded-none group cursor-pointer gsap-reveal"
          [class.product-card--scroll]="featuredProducts.length > 4"
          [routerLink]="['/products', product.slug]"
          (click)="trackProductClick(product)">
          <figure class="relative aspect-square overflow-hidden bg-gray-50">
            <img [src]="product.image" alt="{{ product.name }}"
              class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
              [parallaxSpeed]="30" />
            <div *ngIf="product.tag"
              class="absolute top-4 right-4 bg-[var(--color-ixora-black)] text-white text-xs uppercase px-3 py-1 tracking-wider">
              {{ product.tag }}
            </div>
            <div
              class="absolute bottom-0 left-0 w-full p-4 translate-y-full group-hover:translate-y-0 transition-transform duration-300">
              <button
                (click)="addToCart(product); $event.stopPropagation()"
                class="btn w-full bg-white text-[var(--color-ixora-black)] hover:bg-[var(--color-ixora-green)] hover:text-white border-none rounded-none">Add to Cart</button>
            </div>
          </figure>
          <div class="card-body px-0 py-6">
            <h3 class="card-title font-sans text-base md:text-lg font-medium tracking-wide text-left">{{ product.name }}</h3>
            <p class="product-description text-gray-500 text-sm mt-2 line-clamp-3 text-left">{{ product.description || 'Description coming soon' }}</p>
            <p class="text-sm font-semibold mt-3" [class.text-red-600]="product.onSale">
              <span *ngIf="product.onSale && product.originalPrice" class="line-through text-gray-400 mr-2">{{ product.originalPrice }}</span>
              {{ product.price }}
            </p>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="cartFeedbackMessage"
         class="fixed bottom-8 right-8 z-50 bg-[var(--color-ixora-black)] text-white px-6 py-4 shadow-xl border border-gray-800 transition-all duration-300 flex items-center gap-3">
      <span class="text-sm font-sans tracking-wide uppercase">{{ cartFeedbackMessage }}</span>
      <button (click)="cartFeedbackMessage = ''" class="text-gray-400 hover:text-white ml-2">&times;</button>
    </div>
  </section>
</section>
