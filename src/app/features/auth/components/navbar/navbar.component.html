<nav class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
  [class.shadow-sm]="isScrolled && !isMobileMenuOpen"
  [class.navbar-dark]="isOnHomePage && isOnHero"
  [class.navbar-light]="!(isOnHomePage && isOnHero)"
  [ngClass]="(isOnHomePage && isOnHero) ? (isMobileMenuOpen ? 'bg-white text-black' : 'bg-transparent') : (isScrolled && !isMobileMenuOpen ? 'bg-white/75 backdrop-blur-md text-black' : 'bg-white/90 text-black')">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-10 flex items-center justify-between h-[64px]">

    <!-- Logo -->
    <a routerLink="/" class="flex-shrink-0">
      <img src="/icons/IXORLogo.png" alt="ixora logo" class="logo-img h-10 sm:h-12 object-contain" noParallax />
    </a>

    <!-- Center links (desktop) -->
    <ul class="hidden lg:flex items-center gap-8 text-[11px] uppercase tracking-[0.18em] font-semibold">
      <li><a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact:true}" class="nav-link hover:text-[var(--color-ixora-green)] transition-colors duration-200">Home</a></li>
      <li><a routerLink="/products" routerLinkActive="active-link" class="nav-link hover:text-[var(--color-ixora-green)] transition-colors duration-200">Products</a></li>

        <div class="dropdown dropdown-hover dropdown-bottom">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                  </svg>
                </span>
              </a>
              <ul *ngIf="cat.children?.length" class="bg-white/95 shadow-lg border border-gray-100 ml-0">

                  <a routerLink="/products" [queryParams]="{category: sub._id}"
                     class="text-[10px] uppercase tracking-[0.15em] font-medium text-gray-500 hover:text-[var(--color-ixora-green)] hover:bg-gray-50 px-5 py-2.5 border-b border-gray-100 last:border-b-0">

      <li><a routerLink="/about" routerLinkActive="active-link" class="nav-link hover:text-[var(--color-ixora-green)] transition-colors duration-200">About</a></li>
      <li><a routerLink="/contact" routerLinkActive="active-link" class="nav-link hover:text-[var(--color-ixora-green)] transition-colors duration-200">Contact</a></li>
      <li><a routerLink="/products" [queryParams]="{on_sale: true}" routerLinkActive="active-link" class="nav-link hover:text-[var(--color-ixora-green)] transition-colors duration-200">Sales</a></li>
    </ul>

    <!-- Right actions (desktop) -->
    <div class="hidden lg:flex items-center gap-6">
      <div class="w-56">
        <app-search-bar [navigateOnSearch]="true"></app-search-bar>
      </div>

      <a routerLink="/cart" routerLinkActive="text-[var(--color-ixora-green)]" class="relative nav-icon hover:text-[var(--color-ixora-green)] transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z" />
        </svg>
        <span *ngIf="cartTotalItems > 0" class="absolute -top-2 -right-2 min-w-[18px] h-[18px] px-1 bg-[var(--color-ixora-green)] text-white text-[9px] font-bold flex items-center justify-center rounded-full leading-none">
          {{ cartTotalItems > 99 ? '99+' : cartTotalItems }}
        </span>
      </a>

      <ng-container *ngIf="isLoggedIn">
        <div class="relative profile-dropdown-wrapper">
          <button (click)="toggleProfileDropdown()" class="w-9 h-9 rounded-full bg-[var(--color-ixora-black)] text-white flex items-center justify-center text-sm font-semibold hover:opacity-80 transition-opacity cursor-pointer" aria-label="Profile menu" aria-haspopup="true" [attr.aria-expanded]="isProfileDropdownOpen">
            {{ userName ? userName.charAt(0).toUpperCase() : 'U' }}
          </button>

          <div *ngIf="isProfileDropdownOpen"
            class="absolute right-0 top-full mt-2 w-48 bg-white border border-gray-100 shadow-lg rounded-lg py-2 z-50">
            <a routerLink="/profile" routerLinkActive="active-link" (click)="closeProfileDropdown()"
              class="flex items-center gap-3 px-4 py-2.5 text-[11px] uppercase tracking-widest font-semibold text-gray-700 hover:text-[var(--color-ixora-green)] hover:bg-gray-50 transition-colors">
              <i class="fa-solid fa-user w-4 text-center text-xs"></i>
              Profile
            </a>
            <a *ngIf="isAdmin" routerLink="/dashboard" routerLinkActive="active-link" (click)="closeProfileDropdown()"
              class="flex items-center gap-3 px-4 py-2.5 text-[11px] uppercase tracking-widest font-semibold text-gray-700 hover:text-[var(--color-ixora-green)] hover:bg-gray-50 transition-colors">
              <i class="fa-solid fa-chart-bar w-4 text-center text-xs"></i>
              Dashboard
            </a>
            <div class="border-t border-gray-100 my-1"></div>
            <button (click)="logout()"
              class="w-full flex items-center gap-3 px-4 py-2.5 text-[11px] uppercase tracking-widest font-semibold text-gray-700 hover:text-red-500 hover:bg-gray-50 transition-colors cursor-pointer">
              <i class="fa-solid fa-right-from-bracket w-4 text-center text-xs"></i>
              Logout
            </button>
          </div>
        </div>
      </ng-container>

      <ng-container *ngIf="!isLoggedIn">
        <button
          class="px-6 py-2 text-[10px] uppercase tracking-widest font-semibold bg-[var(--color-ixora-black)] text-white hover:bg-[var(--color-ixora-green)] transition-colors duration-300"
          (click)="goToLogin()">
          Login
        </button>
      </ng-container>
    </div>

    <!-- Mobile hamburger -->
    <div class="lg:hidden relative" [style.z-index]="isMobileMenuOpen ? 61 : 60">
      <button class="hamburger-btn p-1.5" [class.hamburger-btn--open]="isMobileMenuOpen" (click)="toggleMobileMenu()" aria-label="Toggle menu" [attr.aria-expanded]="isMobileMenuOpen">
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
      </button>
    </div>

  </div>

  <!-- Mobile full-screen menu -->
  <div
    class="mobile-menu fixed inset-0 flex flex-col items-center justify-center lg:hidden"
    [class.mobile-menu--open]="isMobileMenuOpen">
    <ul class="flex flex-col items-center gap-8 text-2xl uppercase tracking-[0.15em] font-semibold mobile-menu__links">
      <li><a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact:true}" class="block py-2 hover:text-[var(--color-ixora-green)] transition-colors"
          (click)="closeMobileMenu()">Home</a></li>
      <li><a routerLink="/products" routerLinkActive="active-link" class="block py-2 hover:text-[var(--color-ixora-green)] transition-colors"
          (click)="closeMobileMenu()">Products</a></li>
      <!-- <li>
        <details>
          <summary class="list-none block py-2 hover:text-[var(--color-ixora-green)] transition-colors cursor-pointer text-center">
            Categories
          </summary>
          <ul class="mt-4 space-y-3">
            <li *ngFor="let cat of categories">
              <div class="text-base uppercase tracking-[0.1em] font-semibold text-gray-600 py-1">{{ cat.name }}</div>
              <ul *ngIf="cat.children?.length" class="space-y-1 mb-4">
                <li *ngFor="let sub of cat.children">
                  <a routerLink="/products" [queryParams]="{category: sub._id}"
                     class="block text-sm font-medium text-gray-500 hover:text-[var(--color-ixora-green)] transition-colors py-1"
                     (click)="closeMobileMenu()">{{ sub.name }}</a>
                </li>
              </ul>
              <a *ngIf="!cat.children?.length" routerLink="/products" [queryParams]="{category: cat._id}"
                 class="block text-sm font-medium text-gray-500 hover:text-[var(--color-ixora-green)] transition-colors py-1"
                 (click)="closeMobileMenu()">{{ cat.name }}</a>
            </li>
          </ul>
        </details>
      </li> -->
      <li><a routerLink="/about" routerLinkActive="active-link" class="block py-2 hover:text-[var(--color-ixora-green)] transition-colors"
          (click)="closeMobileMenu()">About</a></li>
      <li><a routerLink="/contact" routerLinkActive="active-link" class="block py-2 hover:text-[var(--color-ixora-green)] transition-colors"
          (click)="closeMobileMenu()">Contact</a></li>
      <li><a routerLink="/products" [queryParams]="{on_sale: true}" routerLinkActive="active-link" class="block py-2 hover:text-[var(--color-ixora-green)] transition-colors"
          (click)="closeMobileMenu()">Sales</a></li>
      <li><a routerLink="/cart" routerLinkActive="active-link" class="relative inline-block py-2 hover:text-[var(--color-ixora-green)] transition-colors" 
         (click)="closeMobileMenu()">
        Cart
        <span *ngIf="cartTotalItems > 0" class="absolute -top-1 -right-5 min-w-[18px] h-[18px] px-1 bg-[var(--color-ixora-green)] text-white text-[9px] font-bold flex items-center justify-center rounded-full leading-none">
          {{ cartTotalItems > 99 ? '99+' : cartTotalItems }}
        </span>

    <div class="mt-12 flex flex-col items-center gap-4 mobile-menu__links">

      <ng-container *ngIf="!isLoggedIn">
        <button
          class="px-8 py-3 text-sm uppercase tracking-widest font-semibold bg-[var(--color-ixora-black)] text-white hover:bg-[var(--color-ixora-green)] transition-colors duration-300"
          (click)="goToLogin(); closeMobileMenu()">
          Login
        </button>
      </ng-container>
      <ng-container *ngIf="isLoggedIn">
        <a routerLink="/profile" routerLinkActive="active-link" (click)="closeMobileMenu()"
          class="flex items-center gap-2 text-sm uppercase tracking-widest font-semibold hover:text-[var(--color-ixora-green)] transition-colors">
          <i class="fa-solid fa-user w-4 text-center"></i>
          Profile
        </a>
        <a *ngIf="isAdmin" routerLink="/dashboard" routerLinkActive="active-link" (click)="closeMobileMenu()"
          class="flex items-center gap-2 text-sm uppercase tracking-widest font-semibold bg-[var(--color-ixora-blue)] text-white hover:bg-blue-600 transition-colors duration-300 px-8 py-3">
          <i class="fa-solid fa-chart-bar w-4 text-center"></i>
          Dashboard
        </a>
        <button
          class="text-sm uppercase tracking-widest font-semibold hover:text-[var(--color-ixora-green)] transition-colors"
          (click)="logout(); closeMobileMenu()">
          Logout
        </button>
      </ng-container>
