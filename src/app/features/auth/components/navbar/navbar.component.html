<nav class="fixed top-0 left-0 right-0 z-50 transition-all duration-300" [class.shadow-sm]="isScrolled"
  [ngClass]="isScrolled ? 'bg-white/65 backdrop-blur-md' : 'bg-transparent'">
  <div class="max-w-7xl mx-auto px-6 lg:px-10 flex items-center justify-between h-[56px]">

    <!-- Logo -->
    <a routerLink="/" class="flex-shrink-0">
      <img src="/icons/IXORLogo.png" alt="ixora logo" class="h-12 object-contain" noParallax />
    </a>

    <!-- Center links (desktop) -->
    <ul class="hidden lg:flex items-center gap-8 font-sans text-[11px] uppercase tracking-[0.18em] font-semibold">
      <li><a routerLink="/" class="hover:text-[var(--color-ixora-green)] transition-colors duration-200">Home</a></li>
      <li><a href="#products" class="hover:text-[var(--color-ixora-green)] transition-colors duration-200">Products</a>
      </li>
      <li><a href="#brand" class="hover:text-[var(--color-ixora-green)] transition-colors duration-200">Brand</a></li>
      <li><a href="#contact" class="hover:text-[var(--color-ixora-green)] transition-colors duration-200">Contact</a>
      </li>
    </ul>

    <!-- Right actions (desktop) -->
    <div class="hidden lg:flex items-center gap-6">
      <button class="hover:text-[var(--color-ixora-green)] transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </button>

      <ng-container *ngIf="isLoggedIn && isAdmin">
        <span class="text-[11px] font-sans text-gray-500">Hi, {{ userName }}</span>
        <button
          class="px-5 py-1.5 text-[10px] uppercase tracking-widest font-semibold bg-[var(--color-ixora-blue)] text-white hover:bg-blue-600 transition-colors duration-200"
          (click)="goToDashboard()">Dashboard</button>
        <button
          class="text-[10px] uppercase tracking-widest font-semibold hover:text-[var(--color-ixora-green)] transition-colors"
          (click)="logout()">Logout</button>
      </ng-container>

      <ng-container *ngIf="isLoggedIn && !isAdmin">
        <span class="text-[11px] font-sans text-gray-500">Hi, {{ userName }}</span>
        <button
          class="text-[10px] uppercase tracking-widest font-semibold hover:text-[var(--color-ixora-green)] transition-colors"
          (click)="logout()">Logout</button>
      </ng-container>

      <ng-container *ngIf="!isLoggedIn">
        <button
          class="px-6 py-2 text-[10px] uppercase tracking-widest font-semibold bg-[var(--color-ixora-black)] text-white hover:bg-[var(--color-ixora-green)] transition-colors duration-300"
          (click)="goToLogin()">
          Login
        </button>
      </ng-container>
    </div>

    <!-- Mobile hamburger -->
    <div class="lg:hidden relative z-[60]">
      <button class="hamburger-btn p-1.5" [class.hamburger-btn--open]="isMobileMenuOpen" (click)="toggleMobileMenu()">
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
      </button>
    </div>

  </div>

  <!-- Mobile full-screen menu -->
  <div
    class="mobile-menu fixed inset-0 bg-white z-50 flex flex-col items-center justify-center lg:hidden"
    [class.mobile-menu--open]="isMobileMenuOpen">
    <ul class="flex flex-col items-center gap-8 font-sans text-2xl uppercase tracking-[0.15em] font-semibold mobile-menu__links">
      <li><a routerLink="/" class="block py-2 hover:text-[var(--color-ixora-green)] transition-colors"
          (click)="isMobileMenuOpen=false">Home</a></li>
      <li><a href="#products" class="block py-2 hover:text-[var(--color-ixora-green)] transition-colors"
          (click)="isMobileMenuOpen=false">Products</a></li>
      <li><a href="#brand" class="block py-2 hover:text-[var(--color-ixora-green)] transition-colors"
          (click)="isMobileMenuOpen=false">Brand</a></li>
      <li><a href="#contact" class="block py-2 hover:text-[var(--color-ixora-green)] transition-colors"
          (click)="isMobileMenuOpen=false">Contact</a></li>
    </ul>

    <div class="mt-12 flex flex-col items-center gap-4 mobile-menu__links">
      <ng-container *ngIf="!isLoggedIn">
        <button
          class="px-8 py-3 text-sm uppercase tracking-widest font-semibold bg-[var(--color-ixora-black)] text-white hover:bg-[var(--color-ixora-green)] transition-colors duration-300"
          (click)="goToLogin(); isMobileMenuOpen=false">
          Login
        </button>
      </ng-container>
      <ng-container *ngIf="isLoggedIn && isAdmin">
        <button
          class="px-8 py-3 text-sm uppercase tracking-widest font-semibold bg-[var(--color-ixora-blue)] text-white hover:bg-blue-600 transition-colors duration-300"
          (click)="goToDashboard(); isMobileMenuOpen=false">
          Dashboard
        </button>
      </ng-container>
      <ng-container *ngIf="isLoggedIn">
        <button
          class="text-sm uppercase tracking-widest font-semibold hover:text-[var(--color-ixora-green)] transition-colors"
          (click)="logout(); isMobileMenuOpen=false">
          Logout
        </button>
        <span *ngIf="isLoggedIn" class="text-xs font-sans text-gray-400 mt-2">Hi, {{ userName }}</span>
      </ng-container>
    </div>
  </div>
</nav>
