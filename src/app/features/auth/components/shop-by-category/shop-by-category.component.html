<section class="pt-8 pb-24 max-w-7xl mx-auto px-4">
  <div #revealEl class="text-center mb-8 gsap-reveal">
    <h2 class="text-4xl font-serif">Shop by Category</h2>
    <div class="w-16 h-1 bg-[var(--color-ixora-green)] mx-auto mt-4"></div>
  </div>

  <div class="flex flex-wrap justify-center gap-1 lg:gap-2">
    <div *ngFor="let cat of categories; let i = index" #revealEl [attr.data-delay]="i * 0.1"
      (click)="onCategoryClick(cat)"
      class="group relative w-[160px] lg:w-[180px] h-14 lg:h-16 overflow-hidden cursor-pointer gsap-reveal border border-gray-200 hover:border-transparent transition-all duration-500">

      <img [src]="cat.image" [alt]="cat.name"
        class="absolute inset-0 w-full h-full object-cover opacity-0 scale-90 transition-all duration-500 ease-out group-hover:opacity-100 group-hover:scale-100"
        [parallaxSpeed]="25" />

      <div class="absolute inset-0 bg-white group-hover:bg-black/30 transition-all duration-500"></div>

      <div class="relative z-10 w-full h-full flex items-center justify-center px-4">
        <span class="text-[11px] lg:text-xs uppercase tracking-[0.2em] font-semibold text-gray-600 group-hover:text-white transition-colors duration-500 text-center leading-relaxed">
          {{ cat.name }}
        </span>
      </div>
    </div>
  </div>
</section>
