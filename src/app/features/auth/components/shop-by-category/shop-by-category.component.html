<section class="py-24 container mx-auto px-4">
  <div #revealEl class="text-center mb-16 gsap-reveal">
    <h2 class="text-4xl lg:text-5xl font-serif">Shop by Category</h2>
    <div class="w-16 h-0.5 bg-[var(--color-ixora-black)] mx-auto mt-6"></div>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-3 gap-3 lg:gap-5">
    <div *ngFor="let cat of categories; let i = index" #revealEl [attr.data-delay]="i * 0.1"
      class="group relative h-72 lg:h-80 overflow-hidden cursor-pointer gsap-reveal bg-gray-100">

      <img [src]="cat.image" [alt]="cat.name"
        class="absolute inset-0 w-full h-full object-cover transition-all duration-700 ease-out group-hover:scale-110" />

      <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-transparent transition-all duration-500 group-hover:from-black/60 group-hover:via-black/10"></div>

      <div class="absolute inset-0 p-6 lg:p-8 flex flex-col justify-end">
        <div class="w-6 h-[1.5px] bg-white/50 mb-2.5 transition-all duration-500 ease-out group-hover:w-10 group-hover:bg-white"></div>

        <h3 class="text-white font-serif text-xl lg:text-2xl tracking-wide transition-all duration-500 ease-out group-hover:-translate-y-1">
          {{ cat.name }}
        </h3>

        <div class="overflow-hidden">
          <p class="text-white/60 text-[11px] uppercase tracking-[0.25em] font-semibold translate-y-4 opacity-0 transition-all duration-500 ease-out group-hover:translate-y-0 group-hover:opacity-100 flex items-center gap-2 mt-2">
            <span>Shop</span>
            <span class="inline-block transition-transform duration-300 group-hover:translate-x-1">→</span>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
