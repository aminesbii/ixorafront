<!-- Mobile backdrop -->
<div *ngIf="mobileOpen" class="fixed inset-0 bg-black/40 z-40 lg:hidden" (click)="mobileClose.emit()"></div>

<!-- Sidebar drawer -->
<div class="space-y-8 max-lg:transition-transform max-lg:duration-300 max-lg:fixed max-lg:inset-y-0 max-lg:left-0 max-lg:z-50"
     [class.max-lg:w-[280px]]="true"
     [class.max-lg:bg-white]="true"
     [class.max-lg:p-6]="true"
     [class.max-lg:shadow-2xl]="true"
     [class.max-lg:overflow-y-auto]="true"
     [class.max-lg:translate-x-0]="mobileOpen"
     [class.max-lg:-translate-x-full]="!mobileOpen"
     [class.lg:block]="true"
     [class.lg:relative]="true"
     [class.lg:inset-auto]="true"
     [class.lg:z-auto]="true"
     [class.lg:w-auto]="true"
     [class.lg:bg-transparent]="true"
     [class.lg:p-0]="true"
     [class.lg:shadow-none]="true"
     [class.lg:overflow-visible]="true"
     [class.lg:translate-x-0]="true">

  <!-- Close button (mobile only) -->
  <div class="flex items-center justify-between lg:hidden mb-6">
    <h3 class="text-sm font-semibold uppercase tracking-[0.2em]">Filters</h3>
    <button (click)="mobileClose.emit()" class="text-gray-400 hover:text-black p-1">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Sidebar header with hide button (desktop) -->
  <div class="hidden lg:flex items-center justify-between mb-6">
    <h3 class="text-sm font-semibold uppercase tracking-[0.2em]">Filters</h3>
    <button (click)="hideSidebar.emit()" class="text-gray-400 hover:text-black p-1 transition-colors" title="Hide sidebar">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7M18 19l-7-7 7-7" />
      </svg>
    </button>
  </div>

    <!-- Active Filter Chips -->
    <div *ngIf="filters.category_ids.length > 0" class="flex flex-wrap gap-2 mb-2">
      <span *ngFor="let catId of filters.category_ids"
        class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-[var(--color-ixora-black)] text-white text-[10px] uppercase tracking-[0.15em] font-semibold">
        {{ getCategoryName(catId) }}
        <button (click)="removeCategory(catId)" class="ml-0.5 hover:text-[var(--color-ixora-green)] transition-colors cursor-pointer" aria-label="Remove filter">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </span>
    </div>

    <!-- Sort -->
    <div class="relative">
      <h4 class="text-[10px] uppercase tracking-[0.18em] font-semibold text-gray-500 mb-3">Sort By</h4>
      <button (click)="toggleSort()" (blur)="closeSort()"
        class="w-full flex items-center justify-between px-4 py-2.5 border border-gray-200 bg-white text-sm text-gray-800 hover:border-gray-300 transition-colors">
        <span>{{ activeSortLabel }}</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-gray-400 transition-transform duration-200"
             [class.rotate-180]="sortOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div *ngIf="sortOpen"
        class="absolute left-0 right-0 top-full mt-1 bg-white border border-gray-200 shadow-lg z-10 divide-y divide-gray-100">
        <button *ngFor="let opt of sortOptions"
          (click)="setSort(opt.value)"
          class="w-full text-left px-4 py-2.5 text-sm transition-colors"
          [class.bg-gray-50]="filters.sort === opt.value"
          [class.font-semibold]="filters.sort === opt.value"
          [class.text-[var(--color-ixora-black)]]="filters.sort === opt.value"
          [class.text-gray-600]="filters.sort !== opt.value"
          [class.hover:bg-gray-50]="filters.sort !== opt.value">
          {{ opt.label }}
        </button>
      </div>
    </div>

    <!-- Categories -->
    <div>
      <h4 class="text-[10px] uppercase tracking-[0.18em] font-semibold text-gray-500 mb-4">Categories</h4>
      <ul class="space-y-2">
        <li *ngFor="let cat of categories">
          <details *ngIf="cat.children?.length" class="group">
            <summary class="flex items-center justify-between py-2 cursor-pointer list-none text-sm text-gray-700 font-medium hover:text-[var(--color-ixora-green)] transition-colors">
              <button (click)="toggleCategory(cat.id || cat._id); $event.stopPropagation()"
                class="flex items-center gap-3 text-left">
                <span class="w-4 h-4 border border-gray-300 flex items-center justify-center flex-shrink-0 transition-colors"
                      [class.bg-[var(--color-ixora-black)]!]="isCategorySelected(cat.id || cat._id)"
                      [class.border-[var(--color-ixora-black)]]="isCategorySelected(cat.id || cat._id)">
                  <svg *ngIf="isCategorySelected(cat.id || cat._id)" xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                  </svg>
                </span>
                <span>{{ cat.name }}</span>
              </button>
              <svg *ngIf="cat.children?.length" xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-gray-400 transition-transform duration-200 group-open:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </summary>
            <ul *ngIf="cat.children?.length" class="ml-4 space-y-1 pb-2">
              <li *ngFor="let sub of cat.children">
                <button (click)="toggleCategory(sub.id || sub._id)"
                  class="flex items-center gap-3 w-full text-left py-1.5 group transition-colors">
                  <span class="w-4 h-4 border border-gray-300 flex items-center justify-center flex-shrink-0 transition-colors"
                        [class.bg-[var(--color-ixora-black)]!]="isCategorySelected(sub.id || sub._id)"
                        [class.border-[var(--color-ixora-black)]]="isCategorySelected(sub.id || sub._id)">
                    <svg *ngIf="isCategorySelected(sub.id || sub._id)" xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                    </svg>
                  </span>
                  <span class="text-xs text-gray-500 group-hover:text-[var(--color-ixora-green)] transition-colors">{{ sub.name }}</span>
                </button>
              </li>
            </ul>
          </details>
          <button *ngIf="!cat.children?.length" (click)="toggleCategory(cat.id || cat._id)"
            class="flex items-center gap-3 w-full text-left py-1.5 group transition-colors">
            <span class="w-4 h-4 border border-gray-300 flex items-center justify-center flex-shrink-0 transition-colors"
                  [class.bg-[var(--color-ixora-black)]!]="isCategorySelected(cat.id || cat._id)"
                  [class.border-[var(--color-ixora-black)]]="isCategorySelected(cat.id || cat._id)">
              <svg *ngIf="isCategorySelected(cat.id || cat._id)" xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
              </svg>
            </span>
            <span class="text-sm text-gray-700 group-hover:text-[var(--color-ixora-green)] transition-colors">{{ cat.name }}</span>
          </button>
        </li>
      </ul>
    </div>

    <!-- Clear Filters -->
    <button *ngIf="hasActiveFilters()"
            (click)="clearAll()"
            class="text-[10px] uppercase tracking-widest font-semibold text-gray-500 hover:text-[var(--color-ixora-black)] transition-colors">
      Clear all filters
    </button>
</div>
