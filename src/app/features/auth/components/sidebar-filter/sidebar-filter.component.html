<!-- Mobile backdrop -->
<div *ngIf="mobileOpen" class="fixed inset-0 bg-black/40 z-40 lg:hidden" (click)="mobileClose.emit()"></div>

<!-- Sidebar drawer -->
<div class="space-y-8"
     [class.fixed]="mobileOpen"
     [class.inset-y-0]="mobileOpen"
     [class.left-0]="mobileOpen"
     [class.z-50]="mobileOpen"
     [class.w-[280px]!]="mobileOpen"
     [class.bg-white]="mobileOpen"
     [class.p-6]="mobileOpen"
     [class.shadow-2xl]="mobileOpen"
     [class.overflow-y-auto]="mobileOpen"
     [class.translate-x-0]="mobileOpen"
     [class.-translate-x-full]="!mobileOpen"
     [class.transition-transform]="mobileOpen"
     [class.duration-300]="mobileOpen"
     [class.hidden]="!mobileOpen"
     [class.lg:block]="true"
     [class.lg:relative]="true"
     [class.lg:inset-auto]="true"
     [class.lg:z-auto]="true"
     [class.lg:w-auto]="true"
     [class.lg:bg-transparent]="true"
     [class.lg:p-0]="true"
     [class.lg:shadow-none]="true"
     [class.lg:overflow-visible]="true"
     [class.lg:translate-x-0]="true">

  <!-- Close button (mobile only) -->
  <div class="flex items-center justify-between lg:hidden mb-6">
    <h3 class="text-sm font-semibold uppercase tracking-[0.2em]">Filters</h3>
    <button (click)="mobileClose.emit()" class="text-gray-400 hover:text-black p-1">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Sort -->
  <div class="relative">
    <h4 class="text-[10px] uppercase tracking-[0.18em] font-semibold text-gray-500 mb-3">Sort By</h4>
    <button (click)="toggleSort()" (blur)="closeSort()"
      class="w-full flex items-center justify-between px-4 py-2.5 border border-gray-200 bg-white text-sm text-gray-800 hover:border-gray-300 transition-colors">
      <span>{{ activeSortLabel }}</span>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-gray-400 transition-transform duration-200"
           [class.rotate-180]="sortOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </button>
    <div *ngIf="sortOpen"
      class="absolute left-0 right-0 top-full mt-1 bg-white border border-gray-200 shadow-lg z-10 divide-y divide-gray-100">
      <button *ngFor="let opt of sortOptions"
        (click)="setSort(opt.value)"
        class="w-full text-left px-4 py-2.5 text-sm transition-colors"
        [class.bg-gray-50]="filters.sort === opt.value"
        [class.font-semibold]="filters.sort === opt.value"
        [class.text-[var(--color-ixora-black)]]="filters.sort === opt.value"
        [class.text-gray-600]="filters.sort !== opt.value"
        [class.hover:bg-gray-50]="filters.sort !== opt.value">
        {{ opt.label }}
      </button>
    </div>
  </div>

  <!-- Categories -->
  <div>
    <h4 class="text-[10px] uppercase tracking-[0.18em] font-semibold text-gray-500 mb-4">Categories</h4>
    <ul class="space-y-2">
      <li *ngFor="let cat of categories">
        <button
          (click)="setCategory(cat._id)"
          class="flex items-center gap-3 w-full text-left py-1.5 group transition-colors"
        >
          <span class="w-4 h-4 border border-gray-300 flex items-center justify-center flex-shrink-0 transition-colors"
                [class.bg-[var(--color-ixora-black)]!]="filters.category_id === cat._id"
                [class.border-[var(--color-ixora-black)]]="filters.category_id === cat._id">
            <svg *ngIf="filters.category_id === cat._id" xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
          </span>
          <span class="text-sm text-gray-700 group-hover:text-[var(--color-ixora-green)] transition-colors">{{ cat.name }}</span>
        </button>

        <!-- Subcategories -->
        <ul *ngIf="cat.children && cat.children.length" class="ml-7 space-y-1 mt-1">
          <li *ngFor="let sub of cat.children">
            <button
              (click)="setCategory(sub._id)"
              class="flex items-center gap-3 w-full text-left py-1 group transition-colors"
            >
              <span class="w-3 h-3 border border-gray-300 flex items-center justify-center flex-shrink-0 transition-colors"
                    [class.bg-gray-800]="filters.category_id === sub._id"
                    [class.border-gray-800]="filters.category_id === sub._id">
                <svg *ngIf="filters.category_id === sub._id" xmlns="http://www.w3.org/2000/svg" class="h-2 w-2 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
              </span>
              <span class="text-xs text-gray-500 group-hover:text-[var(--color-ixora-green)] transition-colors">{{ sub.name }}</span>
            </button>
          </li>
        </ul>
      </li>
    </ul>
  </div>

  <!-- Price Range -->
  <div>
    <h4 class="text-[10px] uppercase tracking-[0.18em] font-semibold text-gray-500 mb-4">Price Range</h4>
    <ul class="space-y-1">
      <li *ngFor="let range of priceRanges">
        <button
          (click)="setPriceRange(range.min, range.max, range.label)"
          class="flex items-center gap-3 w-full text-left py-2 group transition-colors"
        >
          <span class="w-4 h-4 border border-gray-300 flex items-center justify-center flex-shrink-0 transition-colors"
                [class.bg-[var(--color-ixora-black)]!]="selectedPriceLabel === range.label"
                [class.border-[var(--color-ixora-black)]]="selectedPriceLabel === range.label">
            <svg *ngIf="selectedPriceLabel === range.label" xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
          </span>
          <span class="text-sm text-gray-700 group-hover:text-[var(--color-ixora-green)] transition-colors">{{ range.label }}</span>
        </button>
      </li>
    </ul>
  </div>

  <!-- Clear Filters -->
  <button *ngIf="hasActiveFilters()"
          (click)="clearAll()"
          class="text-[10px] uppercase tracking-widest font-semibold text-gray-500 hover:text-[var(--color-ixora-black)] transition-colors">
    Clear all filters
  </button>
</div>
