<section class="py-24 px-4 bg-white" *ngIf="products.length > 0">
  <div class="max-w-7xl mx-auto">
    <div #revealEl class="text-center mb-16">
      <p class="text-xs uppercase tracking-[0.4em] text-red-500 font-semibold mb-4">Limited Time</p>
      <h2 class="text-4xl font-serif">On Sale</h2>
      <div class="w-16 h-1 bg-[var(--color-ixora-green)] mx-auto mt-6"></div>
    </div>

    <div *ngIf="loading" class="flex justify-center py-12">
      <div class="w-8 h-8 border-2 border-[var(--color-ixora-black)] border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div *ngIf="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      <div *ngFor="let product of products; let i = index" #revealEl [attr.data-delay]="i * 0.1"
        class="group cursor-pointer"
        [routerLink]="['/products', product.slug]">
        <div class="relative aspect-square overflow-hidden bg-gray-50">
          <img *ngIf="getMainImage(product)" [src]="normalizeUrl(getMainImage(product)!)" [alt]="product.name"
            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
            loading="lazy" />
          <div *ngIf="!getMainImage(product)"
            class="w-full h-full flex items-center justify-center bg-gray-100">
            <svg class="w-10 h-10 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
          </div>
          <div *ngIf="product.sale_percentage"
            class="absolute top-4 left-4 bg-red-600 text-white text-[10px] uppercase font-bold px-3 py-1.5 tracking-wider shadow-md">
            -{{ product.sale_percentage }}%
          </div>
        </div>
        <div class="pt-5">
          <h3 class="font-sans text-sm md:text-base font-medium text-gray-800 tracking-wide">{{ product.name }}</h3>
          <p class="text-sm font-semibold mt-2" *ngIf="productHasPrice(product)" [class.text-red-600]="true">
            <span class="line-through text-gray-400 mr-2">{{ firstVariantPrice(product) }}</span>
            {{ salePrice(product) }}
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
