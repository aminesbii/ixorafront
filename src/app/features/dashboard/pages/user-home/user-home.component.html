<!-- Stats Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
  <div *ngFor="let stat of stats"
    class="bg-white border border-[var(--color-ixora-black)]/10 p-6 flex flex-col justify-between hover:border-[var(--color-ixora-green)] hover:-translate-y-0.5 transition-all duration-200">
    <div class="flex items-center justify-between mb-4">
      <span class="text-xs text-[var(--color-ixora-black)] font-semibold tracking-wider uppercase">{{ stat.title }}</span>
      <div class="w-10 h-10 flex items-center justify-center bg-[var(--color-ixora-green)]/10 text-[var(--color-ixora-green)]">
        <svg *ngIf="stat.icon === 'folder'" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
        </svg>
        <svg *ngIf="stat.icon === 'dns'" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
        </svg>
        <svg *ngIf="stat.icon === 'query_stats'" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
        </svg>
        <svg *ngIf="stat.icon === 'memory'" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 5h10a2 2 0 012 2v10a2 2 0 01-2 2H7a2 2 0 01-2-2V7a2 2 0 012-2z" />
        </svg>
      </div>
    </div>
    <div>
      <h3 class="text-2xl md:text-3xl font-bold text-[var(--color-ixora-black)] tracking-tight mb-1">{{ stat.value }}</h3>
      <span class="text-xs text-[var(--color-ixora-green)] font-medium">{{ stat.change }}</span>
    </div>
  </div>
</div>

<!-- Activity Feed & Quick Actions -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
  <!-- Recent Activities -->
  <div class="lg:col-span-2 bg-white border border-[var(--color-ixora-black)]/10 p-6 flex flex-col justify-between">
    <div>
      <div class="flex items-center justify-between mb-6">
        <div>
          <h3 class="text-base font-bold text-[var(--color-ixora-black)]">Recent Activity</h3>
          <p class="text-xs text-[var(--color-ixora-black)]/50">Chronological history of operations</p>
        </div>
        <button class="text-xs text-[var(--color-ixora-green)] hover:text-[var(--color-ixora-black)] font-semibold cursor-pointer">View all</button>
      </div>

      <div class="space-y-4">
        <div *ngFor="let activity of activities"
          class="flex items-start gap-4 p-3 hover:bg-[var(--color-ixora-green)]/5 transition-colors duration-150">
          <span class="flex-shrink-0 mt-1 flex h-2.5 w-2.5 rounded-full"
            [class.bg-[var(--color-ixora-green)]]="activity.status === 'success'"
            [class.bg-yellow-500]="activity.status === 'warning'"
            [class.bg-[var(--color-ixora-blue)]]="activity.status === 'info'"></span>
          <div class="flex-grow min-w-0">
            <div class="flex items-center justify-between gap-4">
              <p class="text-sm font-semibold text-[var(--color-ixora-black)] truncate">{{ activity.action }}</p>
              <span class="text-[10px] text-[var(--color-ixora-black)]/40 flex-shrink-0">{{ activity.timestamp }}</span>
            </div>
            <p class="text-xs text-[var(--color-ixora-black)]/60 mt-0.5 truncate">{{ activity.target }}</p>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-6 border-t border-[var(--color-ixora-black)]/10 pt-4 flex justify-end">
      <button class="px-4 py-2 bg-[var(--color-ixora-black)] text-white text-xs font-semibold uppercase tracking-widest hover:bg-[var(--color-ixora-green)] transition-all duration-300 cursor-pointer">
        Refresh List
      </button>
    </div>
  </div>

  <!-- Quick Actions Card -->
  <div class="bg-white border border-[var(--color-ixora-black)]/10 p-6 flex flex-col justify-between">
    <div>
      <div class="mb-6">
        <h3 class="text-base font-bold text-[var(--color-ixora-black)]">Quick Operations</h3>
        <p class="text-xs text-[var(--color-ixora-black)]/50">Trigger key workflows immediately</p>
      </div>

      <div class="space-y-3">
        <button class="w-full flex items-center justify-between p-3 bg-white hover:bg-[var(--color-ixora-green)]/5 border border-[var(--color-ixora-black)]/10 transition-all text-left group cursor-pointer">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 flex items-center justify-center bg-[var(--color-ixora-green)]/10 text-[var(--color-ixora-green)]">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
              </svg>
            </div>
            <div>
              <p class="text-xs font-bold text-[var(--color-ixora-black)]">New Cluster</p>
              <p class="text-[10px] text-[var(--color-ixora-black)]/50">Deploy fresh infrastructure</p>
            </div>
          </div>
          <svg class="w-4 h-4 text-[var(--color-ixora-black)]/30 group-hover:text-[var(--color-ixora-green)] transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>

        <button class="w-full flex items-center justify-between p-3 bg-white hover:bg-[var(--color-ixora-green)]/5 border border-[var(--color-ixora-black)]/10 transition-all text-left group cursor-pointer">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 flex items-center justify-center bg-[var(--color-ixora-green)]/10 text-[var(--color-ixora-green)]">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
              </svg>
            </div>
            <div>
              <p class="text-xs font-bold text-[var(--color-ixora-black)]">Export Reports</p>
              <p class="text-[10px] text-[var(--color-ixora-black)]/50">Fetch analytical PDF sheets</p>
            </div>
          </div>
          <svg class="w-4 h-4 text-[var(--color-ixora-black)]/30 group-hover:text-[var(--color-ixora-green)] transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>

        <button class="w-full flex items-center justify-between p-3 bg-white hover:bg-[var(--color-ixora-green)]/5 border border-[var(--color-ixora-black)]/10 transition-all text-left group cursor-pointer">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 flex items-center justify-center bg-[var(--color-ixora-blue)]/10 text-[var(--color-ixora-blue)]">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
              </svg>
            </div>
            <div>
              <p class="text-xs font-bold text-[var(--color-ixora-black)]">System Settings</p>
              <p class="text-[10px] text-[var(--color-ixora-black)]/50">Manage security constraints</p>
            </div>
          </div>
          <svg class="w-4 h-4 text-[var(--color-ixora-black)]/30 group-hover:text-[var(--color-ixora-blue)] transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>
      </div>
    </div>

    <div class="mt-6 border-t border-[var(--color-ixora-black)]/10 pt-4 text-[10px] text-[var(--color-ixora-black)]/50 text-center">
      API Health Check Status: <span class="text-[var(--color-ixora-green)] font-semibold">Online</span>
    </div>
  </div>
</div>
