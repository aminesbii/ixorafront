<aside
  class="w-[60px] md:w-[240px] shrink-0 bg-[var(--color-ixora-black)] flex flex-col sticky top-0 h-screen transition-all duration-300 z-10">
  <div class="flex items-center justify-center md:justify-start gap-3 py-6 px-0 md:px-6 border-b border-white/10">
    <img src="/icons/IXORLogo.png" alt="IXORA" class="h-7 w-auto invert" />
    <span
      class="hidden md:inline text-xl font-extrabold text-[var(--color-ixora-white)] tracking-wide font-serif">IXORA</span>
  </div>
  <nav class="flex-1 flex flex-col gap-1 p-2 md:p-3 overflow-y-auto">
    <a *ngFor="let item of menuItems" [routerLink]="item.route"
      routerLinkActive="bg-white/10 border-l-[3px] border-[var(--color-ixora-green)] text-white"
      [routerLinkActiveOptions]="{ exact: item.route === '/dashboard/home' }"
      class="flex items-center justify-center md:justify-start gap-3 px-0 md:px-4 py-3 text-white/50 text-[0.65rem] font-bold uppercase tracking-widest transition-all duration-200 hover:text-[var(--color-ixora-green)] border-l-[3px] border-transparent outline-none">
      <i class="w-5 text-center text-lg md:text-base shrink-0" [ngClass]="item.icon"></i>
      <span class="hidden md:inline whitespace-nowrap">{{ item.label }}</span>
    </a>
  </nav>
  <div class="p-2 md:p-3 border-t border-white/10">
    <button (click)="logout()"
      class="w-full flex items-center justify-center md:justify-start gap-3 px-0 md:px-4 py-3 text-white/50 text-[0.65rem] font-bold uppercase tracking-widest transition-all duration-200 hover:text-red-500 border-l-[3px] border-transparent outline-none cursor-pointer">
      <i class="w-5 text-center text-lg md:text-base shrink-0 fa-solid fa-right-from-bracket"></i>
      <span class="hidden md:inline whitespace-nowrap">Logout</span>
    </button>
  </div>
</aside>
